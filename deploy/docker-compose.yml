version: "3.9"

# ── Cloud Phone Manager — self-hosted Docker deployment ─────────────────────
# Usage:
#   cp .env.example .env   # fill in SESSION_SECRET and DB password
#   docker compose up -d
#
# To update:
#   docker compose pull && docker compose up -d --build

services:

  # ── PostgreSQL database ───────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       svnphone
      POSTGRES_USER:     svnphone
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U svnphone"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── API server ────────────────────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    restart: unless-stopped
    environment:
      DATABASE_URL:    postgres://svnphone:${POSTGRES_PASSWORD}@postgres:5432/svnphone
      SESSION_SECRET:  ${SESSION_SECRET}
      PORT:            8080
      ROM_STORAGE_PATH:    /roms
      EMULATOR_DATA_PATH:  /data/emulators
      DOCKER_SOCKET_PATH:  /var/run/docker.sock
    volumes:
      # Docker socket — lets the API spin up Redroid containers
      - /var/run/docker.sock:/var/run/docker.sock
      # Persistent ROM library (survives container rebuilds)
      - rom_data:/roms
      # Per-emulator data (ADB keys, user data partitions)
      - emulator_data:/data/emulators
    depends_on:
      postgres:
        condition: service_healthy
    # QEMU needs /dev/kvm for hardware acceleration on x86 hosts
    devices:
      - /dev/kvm:/dev/kvm
    # Redroid requires these Linux capabilities
    cap_add:
      - NET_ADMIN

  # ── DB migration (runs once on first boot, then exits) ────────────────────
  migrate:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    command: >
      sh -c "npx drizzle-kit push --config lib/db/drizzle.config.ts"
    environment:
      DATABASE_URL: postgres://svnphone:${POSTGRES_PASSWORD}@postgres:5432/svnphone
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ── Frontend (nginx serving built React app) ──────────────────────────────
  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      # Expose on 80 — Caddy/Cloudflare tunnel fronts this on your domain
      - "127.0.0.1:3080:80"
    depends_on:
      - api

volumes:
  postgres_data:
  rom_data:
  emulator_data:
