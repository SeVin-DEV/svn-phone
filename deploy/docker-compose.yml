version: "3.9"

# ── Cloud Phone Manager — self-hosted Docker deployment ─────────────────────
#
# Usage:
#   cp .env.example .env        # fill in SESSION_SECRET and POSTGRES_PASSWORD
#   docker compose up -d --build
#
# Cloudflare tunnel must be pointed at port 80 on this host.
# The web container listens on 0.0.0.0:80 — Nginx proxies /api to the API.
#
# To update after a git pull:
#   docker compose up -d --build

services:

  # ── PostgreSQL database ───────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       svnphone
      POSTGRES_USER:     svnphone
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U svnphone"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── DB migration (runs once, then exits) ─────────────────────────────────
  migrate:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    command: >
      sh -c "node -e \"
        const { execSync } = require('child_process');
        execSync('npx drizzle-kit push --config /app/lib/db/drizzle.config.ts', { stdio: 'inherit' });
      \""
    environment:
      DATABASE_URL: postgres://svnphone:${POSTGRES_PASSWORD}@postgres:5432/svnphone
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ── API server ────────────────────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    restart: unless-stopped
    environment:
      DATABASE_URL:        postgres://svnphone:${POSTGRES_PASSWORD}@postgres:5432/svnphone
      SESSION_SECRET:      ${SESSION_SECRET}
      PORT:                8080
      ROM_STORAGE_PATH:    /roms
      EMULATOR_DATA_PATH:  /data/emulators
      DOCKER_SOCKET_PATH:  /var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock   # spin up Redroid containers
      - rom_data:/roms                               # uploaded ROM files
      - emulator_data:/data/emulators                # per-emulator user data
    depends_on:
      migrate:
        condition: service_completed_successfully
    devices:
      - /dev/kvm:/dev/kvm     # QEMU hardware acceleration (x86 hosts)
    cap_add:
      - NET_ADMIN              # required for Redroid networking

  # ── Nginx — serves the React app and proxies /api ─────────────────────────
  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"   # Cloudflare tunnel points here → phone.svn-dev.online
    depends_on:
      - api

volumes:
  postgres_data:
  rom_data:
  emulator_data:
