# ── Cloud Phone Manager — self-hosted Docker deployment ─────────────────────
#
# Usage: run `../deploy/setup.sh` from a clean checkout — it writes .env,
# builds everything, runs the migration, and wires up your ingress
# (Cloudflare Tunnel or Caddy) interactively.
#
# Manual usage:
#   cp .env.example .env        # fill in SESSION_SECRET and POSTGRES_PASSWORD
#   docker compose up -d --build
#
# The web container listens on 127.0.0.1:3080 (loopback only). Whatever
# ingress you point at this host (Cloudflare Tunnel or Caddy) must forward
# to 127.0.0.1:3080 — see setup.sh / caddy-tunnel.md.
#
# To update after a git pull:
#   docker compose up -d --build

services:

  # ── PostgreSQL database ───────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       svnphone
      POSTGRES_USER:     svnphone
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U svnphone"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── DB migration (runs once, then exits) ─────────────────────────────────
  # Uses the `builder` stage, not the final runtime image — drizzle-kit is a
  # devDependency and is pruned from the runtime image (`pnpm install --prod`),
  # so running this against the runtime stage always crashes on missing binary.
  migrate:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
      target: builder
    working_dir: /build
    command: ["pnpm", "--filter", "@workspace/db", "run", "push"]
    environment:
      DATABASE_URL: postgres://svnphone:${POSTGRES_PASSWORD}@postgres:5432/svnphone
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ── API server ────────────────────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    restart: unless-stopped
    environment:
      DATABASE_URL:        postgres://svnphone:${POSTGRES_PASSWORD}@postgres:5432/svnphone
      SESSION_SECRET:      ${SESSION_SECRET}
      PORT:                8080
      ROM_STORAGE_PATH:    /roms
      EMULATOR_DATA_PATH:  /data/emulators
      DOCKER_SOCKET_PATH:  /var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock   # spin up Redroid containers
      - rom_data:/roms                               # uploaded ROM files
      - emulator_data:/data/emulators                # per-emulator user data
    depends_on:
      migrate:
        condition: service_completed_successfully
    devices:
      - /dev/kvm:/dev/kvm     # QEMU hardware acceleration (x86 hosts)
    cap_add:
      - NET_ADMIN              # required for Redroid networking

  # ── Nginx — serves the React app and proxies /api ─────────────────────────
  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      # Bound to loopback only, on a non-privileged port. A single host-level
      # ingress (Cloudflare Tunnel or Caddy — configured by setup.sh) is what
      # actually owns 0.0.0.0:80/443 and forwards to 127.0.0.1:3080. Binding
      # this container straight to 0.0.0.0:80 is what caused the Nginx
      # "Address already in use" crash loop when both tried to grab the same
      # public interface.
      - "127.0.0.1:3080:80"
    depends_on:
      - api

volumes:
  postgres_data:
  rom_data:
  emulator_data:
